<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RetireCalc — Monte Carlo Retirement Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>

  <!-- ── CDN Dependencies ──────────────────────────────────── -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── Data / Config (plain JS, no JSX) ─────────────────── -->
  <script src="js/globals.js"></script>
  <script src="js/config/tokens.js"></script>
  <script src="js/config/taxData.js"></script>
  <script src="js/config/marketData.js"></script>
  <script src="js/config/strategies.js"></script>

  <!-- ── Core Logic (plain JS, no JSX) ────────────────────── -->
  <script src="js/core/utils.js"></script>
  <script src="js/core/engine.js"></script>
</head>
<body>
  <div id="loading-screen">
    <div class="load-logo">◈</div>
    <div class="load-text">Loading RetireCalc…</div>
  </div>
  <div id="root"></div>

  <!-- ── React Components (JSX, processed by Babel) ────────── -->
  <script type="text/babel" src="js/components/ui.jsx"         data-presets="react"></script>
  <script type="text/babel" src="js/components/charts.jsx"     data-presets="react"></script>
  <script type="text/babel" src="js/components/AllocSliders.jsx" data-presets="react"></script>
  <script type="text/babel" src="js/components/TaxSelector.jsx"  data-presets="react"></script>
  <script type="text/babel" src="js/components/ModelInfo.jsx"  data-presets="react"></script>
  <script type="text/babel" src="js/components/Sidebar.jsx"    data-presets="react"></script>
  <script type="text/babel" src="js/components/tabs/Overview.jsx"  data-presets="react"></script>
  <script type="text/babel" src="js/components/tabs/Portfolio.jsx" data-presets="react"></script>
  <script type="text/babel" src="js/components/tabs/Income.jsx"    data-presets="react"></script>
  <script type="text/babel" src="js/components/tabs/Summary.jsx"   data-presets="react"></script>
  <script type="text/babel" src="js/components/Results.jsx"    data-presets="react"></script>
  <script type="text/babel" src="js/App.jsx"                   data-presets="react"></script>
</body>
</html>
